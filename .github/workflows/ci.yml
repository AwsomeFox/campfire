name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  # Lint gate. `npm run lint` fans out per-workspace via `--if-present`, so it
  # exits cleanly today (no workspace ships a `lint` script yet — there is no
  # working eslint flat config). Once a workspace adds one, this job enforces it
  # automatically with no workflow change.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'
          cache: npm
      - run: npm ci
      - run: npm run lint

  # Primary gate for PRs — DO NOT weaken. Builds schema + server + web
  # (`npm run build`) and runs the full server suite: unit (test/unit/*.spec.ts)
  # + e2e (test/*.e2e-spec.ts) via `npm test`.
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  # Re-runs the server unit + e2e suites with coverage instrumentation and
  # publishes the report as a build artifact (lcov + HTML). Kept separate from
  # build-test so the PR gate stays fast and unchanged. The schema package must
  # be built first because the server compiles against @campfire/schema's dist.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/schema
      - run: npm run test:cov
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: apps/server/coverage/
          if-no-files-found: warn

  # Browser E2E (Playwright). Guarded: no Playwright project exists yet (tracked
  # in #81) — now implemented: the root `test:e2e` script builds schema + server +
  # web and runs the Playwright suite (apps/web/e2e) against the real server
  # serving the built SPA on one origin, with a seeded per-role backend. The
  # `--if-present` guard is kept so the job still no-ops if the script is ever
  # removed. The browser is installed explicitly (npm ci does not fetch it).
  e2e-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'
          cache: npm
      - run: npm ci
      # Chromium only — the suite runs a single headless project (see playwright.config.ts).
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e --if-present
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          if-no-files-found: ignore

  # Multi-arch image → GHCR. Only runs on version tags (v1.2.3), and only after
  # build-test passes on that same ref.
  release:
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive image tags
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/awsomefox/campfire:${{ steps.meta.outputs.version }}
            ghcr.io/awsomefox/campfire:latest
