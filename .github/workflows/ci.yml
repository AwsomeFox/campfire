name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Lint + typecheck gate. Root `npm run lint` runs each workspace's flat
  # ESLint config (hard-fail; no `--if-present`). `npm run typecheck` builds
  # schema then runs `tsc --noEmit` in every workspace.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  # Primary gate for PRs — DO NOT weaken. Builds schema + server + web
  # (`npm run build`) and runs the full server suite: unit (test/unit/*.spec.ts)
  # + e2e (test/*.e2e-spec.ts) via `npm test`.
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      # PWA dist contract (manifest, service worker, icons) against apps/web/dist
      # produced by the root `npm run build` above (schema + server + web).
      - run: npm run test:pwa:dist -w apps/web

  # Re-runs the server unit + e2e suites with coverage instrumentation and
  # publishes the report as a build artifact (lcov + HTML). Kept separate from
  # build-test so the PR gate stays fast and unchanged. The schema package must
  # be built first because the server compiles against @campfire/schema's dist.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/schema
      - run: npm run test:cov
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: apps/server/coverage/
          if-no-files-found: warn

  # Browser E2E (Playwright). The root `test:e2e` script builds schema + server +
  # web and runs the Playwright suite (apps/web/e2e) against the real server
  # serving the built SPA on one origin, with a seeded per-role backend.
  # E2E typecheck and the Playwright run are both required gates (#574). Typecheck
  # needs packages/schema built first (@campfire/schema types live in gitignored
  # dist/). The browser is installed explicitly (npm ci does not fetch it).
  e2e-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/schema
      # Type-check Playwright sources before installing the browser / running the suite.
      - run: npm run test:e2e:typecheck -w apps/web
      # Chromium only — the suite runs a single headless project (see playwright.config.ts).
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          if-no-files-found: ignore

