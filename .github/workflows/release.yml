name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-container:
    name: Build and push container image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive image tags
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository_owner }}/campfire" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest

      - name: Generate release notes and update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE="${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
          RELEASE_TAG="${GITHUB_REF_NAME}"

          # Find the previous release tag for the changelog range
          PREV_TAG=$(gh release list --limit 10 --json tagName,isPrerelease,isDraft \
            -q "[.[] | select(.tagName != \"${RELEASE_TAG}\" and .isPrerelease == false and .isDraft == false)] | .[0].tagName // empty")

          # Build the release body: auto-generated changelog + container info
          NOTES="## What's Changed"$'\n\n'

          if [ -n "$PREV_TAG" ]; then
            # Use GitHub's auto-generated notes API for a nice PR-based changelog
            API_NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="$RELEASE_TAG" \
              -f previous_tag_name="$PREV_TAG" \
              -q .body 2>/dev/null || true)

            if [ -n "$API_NOTES" ]; then
              NOTES="$API_NOTES"
            else
              # Fallback: simple commit log
              NOTES="${NOTES}$(git log "${PREV_TAG}..${RELEASE_TAG}" --pretty=format:'* %s (%h)' --no-merges)"$'\n'
            fi
          else
            NOTES="${NOTES}This is the first release."$'\n'
          fi

          # Append container image pull instructions
          NOTES="${NOTES}"$'\n\n---\n\n'"## Container image"$'\n\n'
          NOTES="${NOTES}"'```'$'\n'"docker pull ${IMAGE}"$'\n''```'

          gh release edit "$RELEASE_TAG" --notes "$NOTES"
          echo "✅ Updated release ${RELEASE_TAG} with changelog and image link"
