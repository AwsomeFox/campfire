name: Publish release

on:
  push:
    # GitHub tag filters are globs, not regular expressions. Narrow the trigger
    # to version-shaped tags here; the publisher then applies the exact stable
    # SemVer vX.Y.Z validation before any mutation.
    tags: ['v[0-9]*.[0-9]*.[0-9]*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release tag (no mutation)
    if: ${{ !contains(github.ref_name, '-') && !contains(github.ref_name, '+') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      pull-requests: read
      issues: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'
      - name: Validate and preview generated notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/release/publish-release.mjs --dry-run

  publish-container:
    name: Publish container image
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Derive image tags
        id: meta
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/awsomefox/campfire:${{ steps.meta.outputs.version }}
            ghcr.io/awsomefox/campfire:latest

  publish-github-release:
    name: Publish exactly one GitHub Release
    needs: [validate, publish-container]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: read
      pull-requests: read
      issues: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'
      - name: Create or find the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/release/publish-release.mjs
