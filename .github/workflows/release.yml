name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-container:
    name: Build and push container image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive image tags
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository_owner }}/campfire" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest

      - name: Append image link to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE="${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
          RELEASE_TAG="${GITHUB_REF_NAME}"

          # Fetch current release body
          CURRENT_BODY=$(gh release view "$RELEASE_TAG" --json body -q .body)

          # Append container image info (skip if already present)
          if echo "$CURRENT_BODY" | grep -q "ghcr.io"; then
            echo "Image link already present in release body, skipping."
          else
            UPDATED_BODY="${CURRENT_BODY}

---

## Container image

\`\`\`
docker pull ${IMAGE}
\`\`\`"

            gh release edit "$RELEASE_TAG" --notes "$UPDATED_BODY"
            echo "✅ Updated release ${RELEASE_TAG} with image link: ${IMAGE}"
          fi
