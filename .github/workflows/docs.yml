name: Docs

# Build the Campfire marketing + docs site (website/) with Zensical and publish
# it to GitHub Pages. Runs on changes to the site or on manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Zensical reads mkdocs.yml natively; mkdocs-material provides the theme.
      - run: pip install zensical mkdocs-material
      - name: Build site
        working-directory: website
        run: zensical build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
